{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <h1>Lineage</h1>
  <p class="lede">Feature-table-only graph. Edges show dependencies between feature tables; non-feature dependencies (sources, staging models) are intentionally hidden.</p>
</section>

<section class="lineage-graph">
  <pre class="mermaid">{{ mermaid_source }}</pre>
  <noscript>
    <p class="muted">Lineage graph requires JavaScript. Source:</p>
    <pre><code>{{ mermaid_source }}</code></pre>
  </noscript>
</section>
{% endblock %}

{% block scripts %}
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs";
  mermaid.initialize({ startOnLoad: true, securityLevel: "loose", theme: "neutral" });
</script>
{% endblock %}
