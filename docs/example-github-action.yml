# Reference workflow — NOT meant to run in this repo.
#
# Copy this file into your own dbt project at .github/workflows/feature-catalog.yml
# (or any name you like). It builds the catalog on every push to main and publishes
# the static site to GitHub Pages. Adjust paths and triggers to match your project.
name: feature-catalog

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt + dbt-features
        run: |
          pip install dbt-duckdb dbt-features
      - name: Parse dbt project
        run: dbt parse --profiles-dir .
      - name: (Optional) generate catalog.json for warehouse types
        run: dbt docs generate --profiles-dir .
      - name: Build feature catalog
        run: dbt-features build --output ./catalog-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./catalog-site
      - uses: actions/deploy-pages@v4
